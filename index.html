<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat — Premium iOS Scheduler Dashboard</title>
  
  <!-- Google Fonts: Outfit (headings) & Plus Jakarta Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <!-- Main Grid App Layout -->
  <div class="app-layout">
    
    <!-- Sidebar Navigation -->
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <i data-lucide="cat" class="icon-glow"></i>
        </div>
        <span class="brand-text">Cat</span>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard" id="nav-dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="calendar" id="nav-calendar">
          <i data-lucide="calendar"></i>
          <span>Scheduler</span>
        </button>
        <button class="nav-item" data-view="links" id="nav-links">
          <i data-lucide="link-2"></i>
          <span>Meeting Links</span>
        </button>
        <button class="nav-item" data-view="booking-sim" id="nav-booking-sim">
          <i data-lucide="laptop"></i>
          <span>Booking Simulator</span>
        </button>
        <button class="nav-item" data-view="settings" id="nav-settings">
          <i data-lucide="sliders"></i>
          <span>Settings</span>
        </button>
      </nav>
      

    </aside>
    
    <!-- Main Content Area -->
    <main class="app-main">
      
      <!-- Top Navigation Header -->
      <header class="app-header">
        <div class="header-breadcrumbs">
          <span class="breadcrumb-root">Cat</span>
          <span class="breadcrumb-separator"><i data-lucide="chevron-right"></i></span>
          <span class="breadcrumb-current" id="header-title">Dashboard</span>
        </div>
        
        <div class="header-actions">
          <div class="timezone-picker-wrapper">
            <i data-lucide="globe" class="picker-icon"></i>
            <select id="global-timezone-select" class="premium-select">
              <option value="UTC">UTC (GMT+0)</option>
              <option value="Europe/London">London (GMT+1)</option>
              <option value="Europe/Paris">Paris (GMT+2)</option>
              <option value="Asia/Kolkata" selected>Mumbai (GMT+5:30)</option>
              <option value="Asia/Singapore">Singapore (GMT+8)</option>
              <option value="Asia/Tokyo">Tokyo (GMT+9)</option>
              <option value="America/New_York">New York (EST/EDT)</option>
              <option value="America/Chicago">Chicago (CST/CDT)</option>
              <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
            </select>
          </div>
          
          <div class="system-status-indicator">
            <span class="status-pulse-green"></span>
            <span class="status-text">Sim Live</span>
          </div>
        </div>
      </header>
      
      <!-- View Containers -->
      <div class="view-content-wrapper">
        
        <!-- MODULE 1: SaaS Dashboard & Analytics -->
        <section id="view-dashboard" class="router-view active">
          <!-- Dynamically Rendered by dashboard.js -->
        </section>
        
        <!-- MODULE 2: Interactive Scheduler -->
        <section id="view-calendar" class="router-view">
          <!-- Dynamically Rendered by calendar.js -->
        </section>
        
        <!-- MODULE 3: Meeting Link Templates -->
        <section id="view-links" class="router-view">
          <!-- Dynamically Rendered by meetingTypes.js -->
        </section>
        
        <!-- MODULE 4: Client Booking Simulator -->
        <section id="view-booking-sim" class="router-view">
          <!-- Dynamically Rendered by booking.js -->
        </section>
        
        <!-- MODULE 5: Settings & Availability -->
        <section id="view-settings" class="router-view">
          <!-- Dynamically Rendered by app.js (static settings fields) -->
        </section>
        
      </div>
    </main>
  </div>
  
  <!-- Global Toast Notification Center -->
  <div id="toast-container" class="toast-wrapper"></div>
  
  <!-- Global Modal Dialog Overlay -->
  <div id="global-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Modal Title</h3>
        <button id="modal-close-btn" class="modal-close-icon"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="modal-body-content">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </div>
  
  <!-- Load App Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
